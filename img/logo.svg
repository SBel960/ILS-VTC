<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a460"/>
      <stop offset="100%" stop-color="#8a6a38"/>
    </linearGradient>
  </defs>

  <!-- ── Marque (carré + route) ── -->
  <!-- Cadre extérieur -->
  <rect x="1" y="1" width="66" height="66" stroke="url(#g)" stroke-width="1.2" fill="none"/>
  <!-- Triangle / chevron route -->
  <path d="M12 54 L34 18 L56 54" stroke="url(#g)" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Base horizontale -->
  <line x1="10" y1="54" x2="58" y2="54" stroke="url(#g)" stroke-width="1" stroke-linecap="round"/>
  <!-- Tiret central (ligne de route) -->
  <line x1="34" y1="32" x2="34" y2="46" stroke="url(#g)" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- ── Séparateur vertical ── -->
  <line x1="84" y1="10" x2="84" y2="62" stroke="#9e8055" stroke-width="0.7" opacity="0.4"/>

  <!-- ── Wordmark ILS ── -->
  <text x="98" y="42"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="30"
    font-weight="400"
    fill="#e8e4dd"
    letter-spacing="5">ILS</text>

  <!-- ── Sous-titre VTC ── -->
  <text x="100" y="58"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    font-weight="500"
    fill="#9e8055"
    letter-spacing="9">VTC</text>

  <!-- ── Ligne décorative ── -->
  <line x1="98" y1="47" x2="218" y2="47" stroke="#9e8055" stroke-width="0.5" opacity="0.45"/>

  <!-- ── Tagline ── -->
  <text x="100" y="68"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="7.5"
    font-weight="300"
    fill="#9e8055"
    letter-spacing="3.5"
    opacity="0.75">BLOIS · TRANSPORT PRIVÉ</text>
</svg>
